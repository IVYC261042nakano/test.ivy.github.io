<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>シンプル・スロット</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #2c3e50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: white;
        }

        .game-container {
            background-color: #34495e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            border: 5px solid #f1c40f;
        }

        .balance-container {
            font-size: 24px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .reels {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .reel {
            width: 80px;
            height: 100px;
            background-color: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            color: #333;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
        }

        button {
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            box-shadow: 0 5px #c0392b;
        }

        button:hover {
            background-color: #ff5e4d;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: 0 1px #c0392b;
        }

        button:disabled {
            background-color: #7f8c8d;
            box-shadow: 0 5px #95a5a6;
            cursor: not-allowed;
        }

        .message {
            margin-top: 20px;
            height: 30px;
            font-size: 20px;
            font-weight: bold;
            color: #f1c40f;
        }

        .spinning {
            animation: blur 0.1s infinite;
        }

        @keyframes blur {
            0% { filter: blur(0px); }
            50% { filter: blur(4px); }
            100% { filter: blur(0px); }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>🎰 ラッキースロット</h1>
        
        <div class="balance-container">
            所持金: <span id="balance">100</span> 枚
        </div>

        <div class="reels">
            <div id="reel1" class="reel">🍒</div>
            <div id="reel2" class="reel">🍒</div>
            <div id="reel3" class="reel">🍒</div>
        </div>

        <button id="spin-button" onclick="spin()">回転！（10枚消費）</button>

        <div id="message" class="message"></div>
    </div>

    <script>
        let balance = 100;
        const symbols = ['🍒', '🍋', '🍉', '🔔', '💎', '7️⃣'];
        const reelElements = [
            document.getElementById('reel1'),
            document.getElementById('reel2'),
            document.getElementById('reel3')
        ];
        const btn = document.getElementById('spin-button');
        const msg = document.getElementById('message');
        const balanceDisplay = document.getElementById('balance');

        function getRandomSymbol() {
            return symbols[Math.floor(Math.random() * symbols.length)];
        }

        function spin() {
            if (balance < 10) {
                msg.textContent = "コインが足りません！";
                return;
            }

            // 初期化
            balance -= 10;
            updateDisplay();
            btn.disabled = true;
            msg.textContent = "回転中...";
            
            // アニメーション開始
            reelElements.forEach(reel => reel.classList.add('spinning'));

            // 時間差で止める演出
            let stopCount = 0;
            const results = [null, null, null];

            reelElements.forEach((reel, index) => {
                setTimeout(() => {
                    results[index] = getRandomSymbol();
                    reel.textContent = results[index];
                    reel.classList.remove('spinning');
                    stopCount++;

                    if (stopCount === 3) {
                        checkResult(results);
                    }
                }, 1000 + (index * 500)); // 1秒、1.5秒、2秒後に停止
            });
        }

        function checkResult(results) {
            btn.disabled = false;
            const [r1, r2, r3] = results;

            if (r1 === r2 && r2 === r3) {
                let winAmount = 0;
                if (r1 === '7️⃣') {
                    winAmount = 150;
                    msg.textContent = "✨超絶大当たり！(150枚獲得)✨";
                } else if (r1 === '💎') {
                    winAmount = 80;
                    msg.textContent = "💎大当たり！(80枚獲得)💎";
                } else {
                    winAmount = 40;
                    msg.textContent = "🔔当たり！(40枚獲得)🔔";
                }
                balance += winAmount;
            } else if (r1 === r2 || r2 === r3 || r1 === r3) {
                balance += 5;
                msg.textContent = "おっ、惜しい！（5枚返還）";
            } else {
                msg.textContent = "残念、ハズレ...";
            }

            updateDisplay();

            if (balance <= 0) {
                msg.textContent = "ゲームオーバー！リロードして復活！";
                btn.disabled = true;
            }
        }

        function updateDisplay() {
            balanceDisplay.textContent = balance;
        }
    </script>
</body>
</html>
